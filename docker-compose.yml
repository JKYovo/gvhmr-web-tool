services:
  gvhmr-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: gvhmr-web:latest
    container_name: gvhmr-web
    gpus: all
    shm_size: "8gb"
    environment:
      GVHMR_HOST: "0.0.0.0"
      GVHMR_PORT: "${GVHMR_PORT:-7860}"
      GVHMR_CHECKPOINT_ROOT: "/app/runtime/checkpoints"
      GVHMR_OUTPUT_ROOT: "/app/runtime/jobs"
      GVHMR_BATCH_ROOT: "/app/runtime/batches"
      GVHMR_DB_PATH: "/app/runtime/db/job_db.sqlite"
      GVHMR_SYNC_ASSETS_ON_BOOT: "0"
    ports:
      - "${GVHMR_PORT_BIND:-127.0.0.1:7860:7860}"
    volumes:
      - ./runtime/checkpoints:/app/runtime/checkpoints
      - ./runtime/jobs:/app/runtime/jobs
      - ./runtime/batches:/app/runtime/batches
      - ./runtime/db:/app/runtime/db
    command:
      - python3
      - -m
      - hmr4d.service.server
      - --host
      - "0.0.0.0"
      - --port
      - "${GVHMR_PORT:-7860}"
